version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: taskflow_mysql
    restart: always
    environment:
      MYSQL_DATABASE: taskflow_db
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: taskflow_user
      MYSQL_PASSWORD: taskflow_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./seed_data.sql:/docker-entrypoint-initdb.d/2-seed_data.sql

volumes:
  mysql_data:
